name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          INDEX_VERSION=$(grep -E '^export const VERSION = ' src/index.ts | sed -E 's/.*"(.*)".*/\1/')
          echo "tag: $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          echo "src/index.ts: $INDEX_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$INDEX_VERSION" ]; then
            echo "::error::tag, package.json, and src/index.ts VERSION must all match"
            exit 1
          fi

      - run: npm ci || npm install
      # Block publish if any direct or transitive dep has a known
      # high/critical CVE. Catches the auto-bump → poisoned-version
      # path even when our cooldown has expired.
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
