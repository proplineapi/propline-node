name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Node 20 ships with npm 10.x; OIDC trusted publishing needs
      # npm 11.5.1+. Without this, the publish step gets 404 on PUT
      # because npm 10.x doesn't know how to exchange the GH OIDC
      # token for an npm registry auth token.
      - run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          INDEX_VERSION=$(grep -E '^export const VERSION = ' src/index.ts | sed -E 's/.*"(.*)".*/\1/')
          echo "tag: $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          echo "src/index.ts: $INDEX_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$INDEX_VERSION" ]; then
            echo "::error::tag, package.json, and src/index.ts VERSION must all match"
            exit 1
          fi

      - run: npm ci || npm install
      # Block publish if any direct or transitive dep has a known
      # high/critical CVE. Catches the auto-bump → poisoned-version
      # path even when our cooldown has expired.
      - run: npm audit --audit-level=high --omit=dev
      - run: npm run build
      # OIDC trusted publishing — no long-lived NPM_TOKEN.
      # Auth: GitHub Actions OIDC token → npm registry validates against
      # the Trusted Publisher config registered for this package on
      # npmjs.com (Repository: proplineapi/propline-node, Workflow:
      # publish.yml). Requires the `id-token: write` permission above.
      - run: npm publish --access public --provenance
